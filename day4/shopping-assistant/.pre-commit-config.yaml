repos:
  - repo: local
    hooks:
      - id: end-of-file-fixer
        name: End of File Fixer
        entry: uv run end-of-file-fixer
        language: system
        types: [text]
        stages: [commit]
      - id: trailing-whitespace
        name: Trailing Whitespace Fixer
        entry: uv run trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [commit]
      - id: semgrep
        name: Semgrep Local Scan
        entry: uv run semgrep --config shopping-assistant/.semgrep/rules.yaml --error
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]
